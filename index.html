<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Authenticator, Verifier & PDF Scanner</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        :root {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --primary: #2563eb;
            --pdf-color: #8b5cf6;
            --success: #10b981;
            --danger: #dc2626;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1);
            text-align: center;
        }
        h2 { margin-top: 0; color: #1e293b; }
        p.subtitle { color: #64748b; margin-bottom: 30px; }
        
        /* Scanner Section */
        #reader { width: 100%; border-radius: 8px; overflow: hidden; margin-bottom: 20px; display: none; }
        
        .action-btns { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        button, .upload-btn {
            background: var(--primary); color: white; border: none; padding: 10px 20px;
            border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: 0.2s;
            display: inline-block; text-align: center; text-decoration: none;
        }
        button:hover, .upload-btn:hover { filter: brightness(1.1); }
        .pdf-btn { background: var(--pdf-color); }
        
        /* Hidden File Inputs */
        input[type="file"] { display: none; }
        
        /* Single Result Section */
        #result-card {
            display: none;
            background: #f1f5f9; padding: 20px; border-radius: 8px;
            border: 2px solid transparent; text-align: left; margin-top: 20px;
            word-wrap: break-word;
        }
        #result-card.authentic { border-color: var(--success); background: #ecfdf5; }
        #result-card.fake { border-color: var(--danger); background: #fef2f2; }
        
        /* PDF Results Table */
        #pdf-results { display: none; margin-top: 20px; text-align: left; width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border: 1px solid #cbd5e1; vertical-align: top; }
        th { background: #f8fafc; color: #334155; font-weight: bold; }
        tr:nth-child(even) { background: #fbfcfd; }
        
        .status-badge {
            display: inline-block; padding: 6px 12px; border-radius: 50px; font-weight: bold;
            font-size: 0.9rem; margin-bottom: 5px;
        }
        .status-badge.authentic { background: var(--success); color: white; }
        .status-badge.fake { background: var(--danger); color: white; }
        
        .stop-btn { background: var(--danger); margin-top: 15px; display: none; }
        .stop-btn:hover { background: #b91c1c; }
        
        .loading { color: var(--primary); font-weight: bold; padding: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>Tracker QR Verifier & PDF Scanner</h2>
    <p class="subtitle">Scan via camera, image, or upload a multi-page PDF.</p>

    <div class="action-btns">
        <label for="image-input" class="upload-btn">📁 Upload Image</label>
        <input type="file" id="image-input" accept="image/*" onchange="scanImage(event)">
        
        <label for="pdf-input" class="upload-btn pdf-btn">📄 Upload PDF</label>
        <input type="file" id="pdf-input" accept="application/pdf" onchange="scanPDF(event)">
        
        <button onclick="startCamera()">📷 Scan Camera</button>
    </div>

    <div id="reader"></div>
    <button id="stop-btn" class="stop-btn" onclick="stopCamera()">Stop Camera</button>

    <div id="result-card">
        <div id="status-badge" class="status-badge">Checking...</div>
        <div id="extracted-details" style="display:none; margin-top: 10px; font-size: 1.05rem; color: #334155;"></div>
    </div>

    <div id="pdf-results">
        <h3 style="margin-bottom: 5px; color: #1e293b;">PDF Analysis Report</h3>
        <p style="margin-top: 0; font-size: 0.85rem; color: #64748b;">QRs are sorted by reading order (Left to Right, Top to Bottom).</p>
        <table>
            <thead>
                <tr>
                    <th style="width: 15%;">Position</th>
                    <th style="width: 25%;">Status</th>
                    <th style="width: 60%;">Data Details</th>
                </tr>
            </thead>
            <tbody id="pdf-table-body"></tbody>
        </table>
    </div>
</div>

<script>
    // Initialize PDF.js worker
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    let html5QrCode;

    // --- Core Verification Logic & Reverse Engineering ---
    function verifyAuthData(text) {
        // 1. Check for Main Session Signature
        if (text.startsWith("AUTH_YT_")) {
            return { authentic: true, statusClass: 'authentic', badgeLabel: '✅ Authentic QR', isDetailQR: false };
        }
        // 2. Check for Page-Specific Signature
        else if (text.startsWith("PAGE_AUTH_")) {
            return { authentic: true, statusClass: 'authentic', badgeLabel: '✅ Authentic QR', isDetailQR: false };
        }
        // 3. Reverse Engineering for Details QRs (URL, USER, LEC)
        else if (text.match(/^(URL|USER|LEC)_SECURE_\[(.*?)\]$/)) {
            const match = text.match(/^(URL|USER|LEC)_SECURE_\[(.*?)\]$/);
            const prefix = match[1];
            const base64str = match[2];
            
            let detailLabel = "";
            if (prefix === "URL") detailLabel = "Video Link";
            else if (prefix === "USER") detailLabel = "Viewer Name";
            else if (prefix === "LEC") detailLabel = "Lecture Name";

            let extractedData = "Encrypted Data";
            
            try {
                // Fixing truncated base64 padding
                let paddedStr = base64str;
                while (paddedStr.length % 4 !== 0) paddedStr += "=";
                
                let decoded = atob(paddedStr);
                
                // Extracting original data string before URI decode
                let dataMatch = decoded.match(/DATA:(.*?)(?:\|TIME:|$)/);
                if (dataMatch) {
                    let rawExtracted = dataMatch[1];
                    // Safely decoding URI component, fallback if truncated
                    try { 
                        extractedData = decodeURIComponent(rawExtracted); 
                    } catch(e) { 
                        extractedData = unescape(rawExtracted); 
                    }
                }
            } catch (e) {
                console.error("Decoding error:", e);
                extractedData = "Data securely encrypted";
            }

            return { 
                authentic: true, 
                statusClass: 'authentic', 
                badgeLabel: '✅ Authentic QR', 
                isDetailQR: true,
                detailLabel: detailLabel,
                extractedData: extractedData
            };
        }

        // Fake / Unverified
        return { authentic: false, statusClass: 'fake', badgeLabel: '❌ Fake / Unverified', isDetailQR: false };
    }

    // --- 1. Handle PDF Upload ---
    async function scanPDF(event) {
        const file = event.target.files[0];
        if (!file) return;

        // Reset UI
        stopCamera();
        document.getElementById('result-card').style.display = "none";
        const pdfResults = document.getElementById('pdf-results');
        const tbody = document.getElementById('pdf-table-body');
        
        tbody.innerHTML = "<tr><td colspan='3' id='pdf-loading-status' class='loading'>⏳ Initializing PDF Scanner...</td></tr>";
        pdfResults.style.display = "block";

        if (!('BarcodeDetector' in window)) {
            tbody.innerHTML = "<tr><td colspan='3' style='color:red; text-align:center; padding: 20px;'>Your browser does not support multi-QR scanning. Please use Google Chrome or Edge.</td></tr>";
            return;
        }

        try {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            const barcodeDetector = new BarcodeDetector({ formats: ['qr_code'] });
            
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d', { willReadFrequently: true });
            
            let totalFound = 0;
            let rowsHTML = ""; 

            // Loop strictly through all pages
            for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                try {
                    document.getElementById('pdf-loading-status').innerText = `⏳ Scanning page ${pageNum} of ${pdf.numPages}... Please wait.`;
                    
                    const page = await pdf.getPage(pageNum);
                    const viewport = page.getViewport({ scale: 2.0 });
                    
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    
                    await page.render({ canvasContext: context, viewport: viewport }).promise;

                    const barcodes = await barcodeDetector.detect(canvas);
                    
                    if (barcodes.length > 0) {
                        barcodes.sort((a, b) => {
                            if (Math.abs(a.boundingBox.y - b.boundingBox.y) > 30) {
                                return a.boundingBox.y - b.boundingBox.y; 
                            }
                            return a.boundingBox.x - b.boundingBox.x;
                        });

                        barcodes.forEach((qr, index) => {
                            totalFound++;
                            const verifyResult = verifyAuthData(qr.rawValue);
                            
                            let detailsHTML = "";
                            if (verifyResult.isDetailQR) {
                                detailsHTML = `<strong>${verifyResult.detailLabel}:</strong> <span style="color:var(--primary);">${verifyResult.extractedData}</span>`;
                            } else if (verifyResult.authentic) {
                                detailsHTML = `<span style="color:#10b981; font-weight:bold;">Secured Verification Token</span>`;
                            } else {
                                detailsHTML = `<span style="color:#dc2626;">No readable details found</span>`;
                            }

                            rowsHTML += `
                                <tr>
                                    <td>
                                        <strong>Page ${pageNum}</strong><br>
                                        <span style="color:#64748b; font-size:0.9rem;">QR Order: ${index + 1}</span>
                                    </td>
                                    <td>
                                        <div class="status-badge ${verifyResult.statusClass}">${verifyResult.badgeLabel}</div>
                                    </td>
                                    <td style="font-size: 0.95rem;">
                                        ${detailsHTML}
                                    </td>
                                </tr>
                            `;
                        });
                    }
                    page.cleanup();
                    
                } catch (pageErr) {
                    console.error(`Error scanning page ${pageNum}:`, pageErr);
                }
            }

            if (totalFound === 0) {
                tbody.innerHTML = "<tr><td colspan='3' style='text-align:center; padding: 20px; color:#64748b;'>No QR Codes detected in this PDF.</td></tr>";
            } else {
                tbody.innerHTML = rowsHTML;
            }

        } catch (error) {
            console.error(error);
            tbody.innerHTML = "<tr><td colspan='3' style='color:red; text-align:center; padding: 20px;'>Error processing PDF. The file might be corrupted.</td></tr>";
        }
        
        document.getElementById('pdf-input').value = "";
    }

    // --- 2. Handle File Upload (Image) ---
    function scanImage(event) {
        const file = event.target.files[0];
        if (!file) return;

        if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
        if (html5QrCode.isScanning) stopCamera();

        html5QrCode.scanFile(file, true)
            .then(decodedText => { processSingleResult(decodedText); })
            .catch(err => {
                alert("QR Code not found. Please try a clearer image.");
            });
        
        document.getElementById('image-input').value = "";
    }

    // --- 3. Handle Camera Scan ---
    function startCamera() {
        document.getElementById('result-card').style.display = "none";
        document.getElementById('pdf-results').style.display = "none";
        document.getElementById('reader').style.display = "block";
        document.getElementById('stop-btn').style.display = "inline-block";

        if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");

        html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: { width: 250, height: 250 } },
            (decodedText) => {
                stopCamera(); 
                processSingleResult(decodedText);
            },
            (errorMessage) => { /* ignore background errors */ }
        ).catch((err) => {
            alert("Camera access denied or not supported.");
            stopCamera();
        });
    }

    function stopCamera() {
        if (html5QrCode && html5QrCode.isScanning) {
            html5QrCode.stop().then(hideCameraUI);
        } else {
            hideCameraUI();
        }
    }
    
    function hideCameraUI() {
        document.getElementById('reader').style.display = "none";
        document.getElementById('stop-btn').style.display = "none";
    }

    // --- 4. Process Single Scan Result ---
    function processSingleResult(text) {
        document.getElementById('pdf-results').style.display = "none";
        const resultCard = document.getElementById('result-card');
        const statusBadge = document.getElementById('status-badge');
        const detailsDiv = document.getElementById('extracted-details');
        
        resultCard.style.display = "block";
        
        const verify = verifyAuthData(text);
        
        resultCard.className = verify.statusClass;
        statusBadge.className = `status-badge ${verify.statusClass}`;
        statusBadge.innerText = verify.badgeLabel;

        if (verify.authentic && verify.isDetailQR) {
            detailsDiv.innerHTML = `<strong>${verify.detailLabel}:</strong> <span style="color:var(--primary);">${verify.extractedData}</span>`;
            detailsDiv.style.display = "block";
        } else if (verify.authentic && !verify.isDetailQR) {
            detailsDiv.innerHTML = `<span style="color:#10b981; font-weight:bold;">Secured Verification Token</span>`;
            detailsDiv.style.display = "block";
        } else {
            detailsDiv.style.display = "none";
        }
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Authenticator & Verifier</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --primary: #2563eb;
            --success: #10b981;
            --danger: #dc2626;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1);
            text-align: center;
        }
        h2 { margin-top: 0; color: #1e293b; }
        p.subtitle { color: #64748b; margin-bottom: 30px; }
        
        /* Scanner Section */
        #reader { width: 100%; border-radius: 8px; overflow: hidden; margin-bottom: 20px; display: none; }
        
        .action-btns { display: flex; gap: 15px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        button, .upload-btn {
            background: var(--primary); color: white; border: none; padding: 12px 24px;
            border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: 0.2s;
            display: inline-block; text-align: center; text-decoration: none;
        }
        button:hover, .upload-btn:hover { background: #1d4ed8; }
        
        /* Hidden File Input */
        #file-input { display: none; }
        
        /* Result Section */
        #result-card {
            display: none;
            background: #f1f5f9; padding: 20px; border-radius: 8px;
            border: 2px solid transparent; text-align: left; margin-top: 20px;
            word-wrap: break-word;
        }
        #result-card.authentic { border-color: var(--success); background: #ecfdf5; }
        #result-card.fake { border-color: var(--danger); background: #fef2f2; }
        
        .status-badge {
            display: inline-block; padding: 8px 15px; border-radius: 50px; font-weight: bold;
            font-size: 1.1rem; margin-bottom: 15px;
        }
        .status-badge.authentic { background: var(--success); color: white; }
        .status-badge.fake { background: var(--danger); color: white; }
        
        .data-row { margin-bottom: 10px; font-family: monospace; font-size: 0.95rem; }
        .data-row span.label { font-weight: bold; color: #475569; font-family: sans-serif; display: inline-block; width: 120px; }
        
        .stop-btn { background: var(--danger); margin-top: 15px; display: none; }
        .stop-btn:hover { background: #b91c1c; }
    </style>
</head>
<body>

<div class="container">
    <h2>Tracker QR Verifier</h2>
    <p class="subtitle">Scan or upload a QR code to verify its authenticity.</p>

    <div class="action-btns">
        <label for="file-input" class="upload-btn">📁 Upload QR Image</label>
        <input type="file" id="file-input" accept="image/*" onchange="scanImage(event)">
        
        <button onclick="startCamera()">📷 Scan via Camera</button>
    </div>

    <div id="reader"></div>
    <button id="stop-btn" class="stop-btn" onclick="stopCamera()">Stop Camera</button>

    <div id="result-card">
        <div id="status-badge" class="status-badge">Checking...</div>
        
        <div class="data-row"><span class="label">Raw Data:</span> <span id="raw-text"></span></div>
        
        <div id="auth-details" style="display:none; margin-top: 15px; border-top: 1px solid #cbd5e1; padding-top: 15px;">
            <div class="data-row"><span class="label">Signature ID:</span> <span id="auth-id" style="color:var(--primary); font-weight:bold;"></span></div>
            <div class="data-row"><span class="label">Encrypted Hash:</span> <span id="auth-hash"></span></div>
        </div>
    </div>
</div>

<script>
    let html5QrCode;

    // --- 1. Handle File Upload (Image) ---
    function scanImage(event) {
        const file = event.target.files[0];
        if (!file) return;

        if (!html5QrCode) {
            html5QrCode = new Html5Qrcode("reader");
        }

        // Hide camera if it was open
        if (html5QrCode.isScanning) stopCamera();

        html5QrCode.scanFile(file, true)
            .then(decodedText => {
                processResult(decodedText);
            })
            .catch(err => {
                alert("QR Code not found in the image. Please try a clearer image.");
                document.getElementById('file-input').value = ""; // Reset input
            });
    }

    // --- 2. Handle Camera Scan ---
    function startCamera() {
        document.getElementById('result-card').style.display = "none";
        document.getElementById('reader').style.display = "block";
        document.getElementById('stop-btn').style.display = "inline-block";

        if (!html5QrCode) {
            html5QrCode = new Html5Qrcode("reader");
        }

        html5QrCode.start(
            { facingMode: "environment" }, // Use back camera
            { fps: 10, qrbox: { width: 250, height: 250 } },
            (decodedText, decodedResult) => {
                stopCamera(); // Stop camera once successfully scanned
                processResult(decodedText);
            },
            (errorMessage) => {
                // Background scanning errors, ignore them
            }
        ).catch((err) => {
            alert("Camera access denied or not supported.");
            stopCamera();
        });
    }

    function stopCamera() {
        if (html5QrCode && html5QrCode.isScanning) {
            html5QrCode.stop().then(() => {
                document.getElementById('reader').style.display = "none";
                document.getElementById('stop-btn').style.display = "none";
            });
        } else {
            document.getElementById('reader').style.display = "none";
            document.getElementById('stop-btn').style.display = "none";
        }
    }

    // --- 3. Reverse Engineering & Verification Logic ---
    function processResult(text) {
        const resultCard = document.getElementById('result-card');
        const statusBadge = document.getElementById('status-badge');
        const rawText = document.getElementById('raw-text');
        const authDetails = document.getElementById('auth-details');
        
        resultCard.style.display = "block";
        rawText.innerText = text;
        
        // Reset classes
        resultCard.className = "";
        statusBadge.className = "status-badge";

        // Checking our custom Signature Format: "AUTH_YT_XXXXXX_HashData"
        if (text.startsWith("AUTH_YT_")) {
            const parts = text.split("_");
            
            if (parts.length >= 4) {
                // It's Authentic
                resultCard.classList.add("authentic");
                statusBadge.classList.add("authentic");
                statusBadge.innerText = "✅ Authentic Signature";
                
                // Extracting Reverse Engineered Data
                const authId = parts[2];
                // Join the rest in case hash contained underscores
                const hashData = parts.slice(3).join("_"); 
                
                document.getElementById('auth-id').innerText = "#" + authId;
                document.getElementById('auth-hash').innerText = hashData;
                authDetails.style.display = "block";
                
                return;
            }
        }
        
        // If it doesn't match our algorithm
        resultCard.classList.add("fake");
        statusBadge.classList.add("fake");
        statusBadge.innerText = "❌ Unverified / Fake QR";
        authDetails.style.display = "none";
    }
</script>

</body>
</html>
